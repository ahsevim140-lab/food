<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب غداء المكتب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4ead4; --panel:#fffaf0; --panel-2:#f0e3c5;
    --line:#ddc9a0; --text:#3b2a1e; --text-dim:#8a7355;
    --rust:#a8452e; --rust-soft:#c1614a; --mustard:#a67a26; --danger:#a8402e;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Cairo', sans-serif; min-height:100vh;}
  .wrap{max-width:820px; margin:0 auto; padding:32px 20px 80px;}
  header{border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:24px;}
  .nav{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px;}
  h1{font-family:'Cairo', sans-serif; font-weight:600; font-size:clamp(22px,5vw,28px); margin:0;}
  .date{font-family:'Cairo', sans-serif; color:var(--mustard); font-size:13px;}
  .tabs{display:flex; gap:8px; margin-top:14px;}
  .tabs button{
    font-family:'Cairo', sans-serif; font-size:13px; cursor:pointer;
    padding:7px 16px; border-radius:20px; border:1px solid var(--line); background:transparent; color:var(--text-dim);
  }
  .tabs button.active{background:var(--rust); color:#fff; border-color:var(--rust); font-weight:600;}

  .view{display:none;}
  .view.active{display:block;}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; font-family:'Cairo', sans-serif; font-size:15px; padding:10px 12px;
    border-radius:8px; border:1px solid var(--line); background:var(--panel); color:var(--text);
  }
  .field select{appearance:none; background-image:linear-gradient(45deg, transparent 50%, var(--mustard) 50%), linear-gradient(135deg, var(--mustard) 50%, transparent 50%); background-position:left 18px center, left 13px center; background-size:5px 5px, 5px 5px; background-repeat:no-repeat;}
  .field textarea{min-height:50px; resize:none;}

  .item-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:16px; display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px;
  }
  .item-panel .name{font-size:15px; flex:1;}
  .item-panel .price{font-family:'IBM Plex Mono', monospace; color:var(--mustard); font-size:14px; direction:ltr;}
  .qty-input{
    width:60px; font-family:'IBM Plex Mono', monospace; font-size:15px; text-align:center;
    padding:8px 6px; border-radius:6px; border:1px solid var(--line); background:var(--bg); color:var(--text);
  }
  .qty-input:focus-visible, select:focus-visible, button:focus-visible, input:focus-visible{outline:2px solid var(--rust); outline-offset:1px;}
  .add-btn{
    font-family:'Cairo', sans-serif; font-size:13px; font-weight:600; padding:9px 14px;
    border-radius:6px; border:none; background:var(--rust); color:#fff; cursor:pointer; white-space:nowrap;
  }
  .add-btn:hover{background:var(--rust-soft);}

  .order-list{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    margin-bottom:16px; overflow:hidden;
  }
  .order-list .order-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 14px; border-bottom:1px solid var(--line); font-size:14px;
  }
  .order-list .order-row:last-child{border-bottom:none;}
  .order-list .order-row .oname{flex:1;}
  .order-list .order-row .oqty{font-family:'IBM Plex Mono', monospace; color:var(--text-dim); font-size:13px; direction:ltr;}
  .order-list .order-row .oline{font-family:'IBM Plex Mono', monospace; color:var(--mustard); direction:ltr; white-space:nowrap;}
  .order-list .order-row .oremove{
    border:none; background:transparent; color:var(--danger); font-size:18px; line-height:1; cursor:pointer; padding:0 4px;
  }

  .cart-summary{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; margin:20px 0; font-size:13.5px;
    display:flex; justify-content:space-between; color:var(--text-dim);
  }
  .cart-summary strong{color:var(--rust); font-size:15px; font-family:'IBM Plex Mono', monospace; direction:ltr; unicode-bidi:embed;}

  .submit-btn{
    width:100%; padding:14px; border:none; border-radius:8px; background:var(--rust); color:#fff;
    font-family:'Cairo', sans-serif; font-weight:600; font-size:15px; cursor:pointer;
    transition:transform 0.08s ease, background 0.15s ease;
  }
  .submit-btn:hover{background:var(--rust-soft);}
  .submit-btn:active{transform:scale(0.98);}
  .submit-btn:disabled{opacity:0.5; cursor:not-allowed;}

  .status{margin-top:12px; font-size:13.5px; text-align:center;}
  .status.ok{color:#5c7a3f;}
  .status.err{color:var(--danger);}
  .loading, .setup-warning, .empty-note{font-family:'Cairo', sans-serif; color:var(--text-dim); font-size:14px; padding:16px 0;}
  .setup-warning{background:var(--panel); border:1px solid var(--rust); border-radius:8px; padding:16px; color:var(--rust);}

  /* Totals matrix */
  .matrix-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:10px; background:var(--panel);}
  table.matrix{width:100%; border-collapse:collapse; font-size:13.5px; min-width:600px;}
  table.matrix th, table.matrix td{padding:9px 10px; border-bottom:1px solid var(--line); white-space:nowrap; text-align:center;}
  table.matrix thead th{
    font-family:'Cairo', sans-serif; font-size:12px; font-weight:600; color:var(--text-dim);
    border-bottom:2px solid var(--line); vertical-align:bottom;
  }
  table.matrix .item-head-name{display:block; color:var(--text);}
  table.matrix .item-head-sub{display:block; font-size:10px; color:var(--text-dim); font-weight:400;}
  table.matrix th.name-col, table.matrix td.name-col{
    text-align:right; position:sticky; right:0; background:var(--panel); font-weight:600; z-index:1;
  }
  table.matrix td.qty-cell{font-family:'IBM Plex Mono', monospace; color:var(--text);}
  table.matrix tr.summary-row td{font-family:'IBM Plex Mono', monospace; color:var(--mustard); font-weight:500; background:var(--panel-2);}
  table.matrix tr.summary-row td.name-col{font-family:'Cairo', sans-serif; color:var(--text); background:var(--panel-2);}

  .totals-footer{
    margin-top:18px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px;
  }
  .totals-footer .row{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed var(--line); font-size:14px;}
  .totals-footer .row:last-child{border-bottom:none; padding-top:12px; font-weight:600; font-size:16px;}
  .totals-footer .row .num{font-family:'IBM Plex Mono', monospace; color:var(--mustard); direction:ltr;}
  .fee-input{
    width:100px; font-family:'IBM Plex Mono', monospace; font-size:14px; text-align:center;
    padding:6px; border-radius:6px; border:1px solid var(--line); background:var(--bg); color:var(--text); direction:ltr;
  }

  .refresh-row{display:flex; justify-content:space-between; align-items:center; margin:16px 0 6px; flex-wrap:wrap; gap:8px;}
  .refresh-btn{
    font-family:'Cairo', sans-serif; font-size:13px; font-weight:600; padding:9px 16px;
    border-radius:8px; border:1px solid var(--line); background:var(--panel); color:var(--rust); cursor:pointer;
  }
  .refresh-btn:hover{background:var(--panel-2);}
  .updated{font-family:'Cairo', sans-serif; font-size:12px; color:var(--text-dim);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="nav">
      <h1 id="page-title">طلب غداء المكتب</h1>
      <div class="date" id="today"></div>
    </div>
    <div class="tabs">
      <button id="tab-order" class="active" onclick="switchTab('order')">تقديم الطلب</button>
      <button id="tab-totals" onclick="switchTab('totals')">عرض الإجماليات</button>
    </div>
  </header>

  <!-- ORDER VIEW -->
  <div id="view-order" class="view active">
    <div class="field">
      <label for="category">الفئة الرئيسية</label>
      <select id="category"><option>جارٍ التحميل…</option></select>
    </div>

    <div class="field">
      <label for="restaurant">المطعم</label>
      <select id="restaurant"><option>اختر الفئة أولاً</option></select>
    </div>

    <div class="field">
      <label for="item">الصنف</label>
      <select id="item"><option>اختر المطعم أولاً</option></select>
    </div>

    <div id="item-panel" class="item-panel" style="display:none;">
      <span class="name" id="item-name"></span>
      <span class="price" id="item-price"></span>
      <input type="number" min="0" step="1" class="qty-input" id="item-qty" placeholder="0">
      <button type="button" class="add-btn" id="add-item-btn">إضافة</button>
    </div>
    <div id="empty-note" class="empty-note" style="display:none;"></div>

    <div id="order-list" class="order-list" style="display:none;"></div>

    <div class="cart-summary">
      <span id="cart-count">0 عنصر مختار</span>
      <span>الإجمالي: <strong id="cart-total">$0.00</strong></span>
    </div>

    <div class="field">
      <label for="name">اسمك</label>
      <select id="name"><option value="">اختر اسمك</option></select>
    </div>
    <div class="field">
      <label for="notes">ملاحظات (اختياري)</label>
      <textarea id="notes" placeholder="بدون بصل، صلصة إضافية…"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn">إرسال الطلب</button>
    <div class="status" id="status"></div>
  </div>

  <!-- TOTALS VIEW -->
  <div id="view-totals" class="view">
    <div class="matrix-wrap">
      <table class="matrix" id="matrix-table">
        <thead><tr id="matrix-head-row"><th class="name-col">الاسم</th></tr></thead>
        <tbody id="matrix-body"></tbody>
        <tfoot id="matrix-foot"></tfoot>
      </table>
    </div>
    <div class="empty-note" id="totals-empty-note" style="display:none;">لم يتم تقديم أي طلبات بعد.</div>

    <div class="totals-footer">
      <div class="row"><span>الإجمالي الفرعي</span><span class="num" id="subtotal">$0.00</span></div>
      <div class="row"><span>رسوم التوصيل</span><input type="number" min="0" step="0.5" class="fee-input" id="delivery-fee" value="0" placeholder="0.00"></div>
      <div class="row"><span>الإجمالي الكلي</span><span class="num" id="full-total">$0.00</span></div>
    </div>

    <div class="refresh-row">
      <button class="refresh-btn" id="refresh-btn">تحديث الآن</button>
      <span class="updated" id="updated"></span>
    </div>
  </div>
</div>

<script>
// ====== ضع رابط تطبيق الويب الكامل من Apps Script هنا بعد النشر ======
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-OyJGz_1v3wCisooJ_bQSWMj_UYH2W8XtHuWT8L7F0-Q2ot4Yvag956h8kadnn7t4/exec';
// ========================================================================

const FOUR_HOURS = 4 * 60 * 60 * 1000;
let MENU = []; // nested: [{category, restaurants:[{restaurant, items:[{id,name,price}]}]}]
const flatMenu = {}; // id -> {name, price, category, restaurant}
const qty = {}; // id -> quantity, persists across dropdown changes
let totalsLoadedOnce = false;
let latestGrandTotal = 0;

document.getElementById('today').textContent = new Date().toLocaleDateString('ar-EG-u-nu-latn', {
  weekday: 'long', month: 'long', day: 'numeric'
});

function switchTab(tab) {
  document.getElementById('view-order').classList.toggle('active', tab === 'order');
  document.getElementById('view-totals').classList.toggle('active', tab === 'totals');
  document.getElementById('tab-order').classList.toggle('active', tab === 'order');
  document.getElementById('tab-totals').classList.toggle('active', tab === 'totals');
  document.getElementById('page-title').textContent = tab === 'order' ? 'طلب غداء المكتب' : 'إجماليات الطلبات';
  if (tab === 'totals' && !totalsLoadedOnce) loadTotals();
}

// ---- Order view ----
async function initOrder() {
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    document.getElementById('category').innerHTML = '<option>الإعداد مطلوب</option>';
    document.getElementById('empty-note').style.display = 'block';
    document.getElementById('empty-note').innerHTML = '<div class="setup-warning">أضف رابط تطبيق الويب من Apps Script إلى APPS_SCRIPT_URL في أعلى الكود بهذا الملف لتحميل القائمة.</div>';
    return;
  }
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const data = await res.json();
    MENU = data.menu || [];
    MENU.forEach(catGroup => catGroup.restaurants.forEach(restGroup => restGroup.items.forEach(item => {
      flatMenu[item.id] = { name: item.name, price: item.price, category: catGroup.category, restaurant: restGroup.restaurant };
    })));
    populateCategories();
    populateEmployees(data.employees || []);
  } catch (err) {
    document.getElementById('category').innerHTML = '<option>تعذر تحميل القائمة</option>';
  }
}

function populateEmployees(names) {
  const select = document.getElementById('name');
  if (!names || names.length === 0) {
    select.innerHTML = '<option value="">لا توجد أسماء بعد — أضفها في تبويب Employees</option>';
    return;
  }
  select.innerHTML = '<option value="">اختر اسمك</option>' +
    names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
}

function populateCategories() {
  const select = document.getElementById('category');
  if (MENU.length === 0) {
    select.innerHTML = '<option>لا توجد أصناف بعد</option>';
    return;
  }
  select.innerHTML = MENU.map(g => `<option value="${escapeHtml(g.category)}">${escapeHtml(g.category)}</option>`).join('');
  select.onchange = populateRestaurants;
  populateRestaurants();
}

function populateRestaurants() {
  const category = document.getElementById('category').value;
  const catGroup = MENU.find(g => g.category === category);
  const select = document.getElementById('restaurant');

  if (!catGroup || catGroup.restaurants.length === 0) {
    select.innerHTML = '<option>لا توجد مطاعم</option>';
    populateItems();
    return;
  }
  select.innerHTML = catGroup.restaurants.map(r => `<option value="${escapeHtml(r.restaurant)}">${escapeHtml(r.restaurant)}</option>`).join('');
  select.onchange = populateItems;
  populateItems();
}

function populateItems() {
  const category = document.getElementById('category').value;
  const restaurant = document.getElementById('restaurant').value;
  const catGroup = MENU.find(g => g.category === category);
  const restGroup = catGroup ? catGroup.restaurants.find(r => r.restaurant === restaurant) : null;
  const select = document.getElementById('item');

  if (!restGroup || restGroup.items.length === 0) {
    select.innerHTML = '<option>لا توجد عناصر</option>';
    hideItemPanel('لا توجد عناصر لهذا الاختيار.');
    return;
  }
  select.innerHTML = restGroup.items.map(item => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join('');
  select.onchange = renderItemPanel;
  renderItemPanel();
}

function renderItemPanel() {
  const id = document.getElementById('item').value;
  const item = flatMenu[id];
  const panel = document.getElementById('item-panel');
  const emptyNote = document.getElementById('empty-note');

  if (!item) { hideItemPanel('اختر صنفًا.'); return; }

  panel.style.display = 'flex';
  emptyNote.style.display = 'none';
  document.getElementById('item-name').textContent = item.name;
  document.getElementById('item-price').textContent = '$' + Number(item.price).toFixed(2);

  const qtyInput = document.getElementById('item-qty');
  qtyInput.value = qty[id] || '';

  const addBtn = document.getElementById('add-item-btn');
  addBtn.onclick = () => {
    const val = Math.max(0, parseInt(qtyInput.value, 10) || 0);
    if (val <= 0) return;
    qty[id] = val;
    qtyInput.value = '';
    renderOrderList();
    renderCartSummary();
  };
}

function renderOrderList() {
  const listEl = document.getElementById('order-list');
  const ids = Object.keys(qty).filter(id => qty[id] > 0 && flatMenu[id]);

  if (ids.length === 0) {
    listEl.style.display = 'none';
    listEl.innerHTML = '';
    return;
  }

  listEl.style.display = 'block';
  listEl.innerHTML = ids.map(id => {
    const item = flatMenu[id];
    const lineTotal = item.price * qty[id];
    return `
      <div class="order-row">
        <span class="oname">${escapeHtml(item.name)}</span>
        <span class="oqty">×${qty[id]}</span>
        <span class="oline">$${lineTotal.toFixed(2)}</span>
        <button type="button" class="oremove" data-id="${id}" aria-label="إزالة ${escapeHtml(item.name)}">×</button>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.oremove').forEach(btn => {
    btn.addEventListener('click', () => {
      qty[btn.dataset.id] = 0;
      renderOrderList();
      renderCartSummary();
      // keep the qty input in sync if that item is still the one showing
      if (document.getElementById('item').value === btn.dataset.id) {
        document.getElementById('item-qty').value = '';
      }
    });
  });
}

function hideItemPanel(message) {
  document.getElementById('item-panel').style.display = 'none';
  const emptyNote = document.getElementById('empty-note');
  emptyNote.style.display = 'block';
  emptyNote.textContent = message;
}

function renderCartSummary() {
  let count = 0, total = 0;
  Object.keys(qty).forEach(id => {
    const q = qty[id] || 0;
    if (q > 0 && flatMenu[id]) { count += q; total += q * flatMenu[id].price; }
  });
  document.getElementById('cart-count').textContent = count + ' عنصر مختار';
  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
}

async function submitOrder() {
  const nameSelect = document.getElementById('name');
  const notesInput = document.getElementById('notes');
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('submit-btn');

  const name = nameSelect.value;
  const items = Object.keys(qty).filter(id => qty[id] > 0).map(id => ({ id, qty: qty[id] }));

  statusEl.textContent = '';
  statusEl.className = 'status';

  if (!name) { statusEl.textContent = 'الرجاء اختيار اسمك.'; statusEl.className = 'status err'; return; }
  if (items.length === 0) { statusEl.textContent = 'الرجاء إضافة عنصر واحد على الأقل.'; statusEl.className = 'status err'; return; }

  btn.disabled = true;
  btn.textContent = 'جارٍ الإرسال…';

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ name, items, notes: notesInput.value.trim() })
    });
    const result = await res.json();

    if (result.ok) {
      statusEl.textContent = 'تم إرسال الطلب — شكرًا ' + name + '! الإجمالي: $' + result.total;
      statusEl.className = 'status ok';
      Object.keys(qty).forEach(id => qty[id] = 0);
      renderItemPanel();
      renderOrderList();
      renderCartSummary();
      nameSelect.value = '';
      notesInput.value = '';
      totalsLoadedOnce = false;
    } else {
      throw new Error(result.error || 'Unknown error');
    }
  } catch (err) {
    statusEl.textContent = 'حدث خطأ ما — حاول مرة أخرى.';
    statusEl.className = 'status err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'إرسال الطلب';
  }
}

// ---- Totals view (employee x item matrix) ----
async function loadTotals() {
  const emptyNote = document.getElementById('totals-empty-note');
  const table = document.getElementById('matrix-table');

  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    table.style.display = 'none';
    emptyNote.style.display = 'block';
    emptyNote.innerHTML = '<div class="setup-warning">أضف رابط تطبيق الويب من Apps Script إلى APPS_SCRIPT_URL في أعلى الكود بهذا الملف.</div>';
    return;
  }

  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=totals');
    const data = await res.json();
    totalsLoadedOnce = true;
    renderMatrix(data);
    document.getElementById('updated').textContent = 'آخر تحديث ' + new Date().toLocaleTimeString('ar-EG-u-nu-latn');
  } catch (err) {
    table.style.display = 'none';
    emptyNote.style.display = 'block';
    emptyNote.innerHTML = '<div class="setup-warning">تعذر تحميل الإجماليات. تحقق من رابط Apps Script.</div>';
  }
}

function renderMatrix(data) {
  const items = data.items || [];
  const employees = data.employees || [];
  const matrix = data.matrix || {};
  const totalsByItem = data.totalsByItem || {};
  const table = document.getElementById('matrix-table');
  const emptyNote = document.getElementById('totals-empty-note');

  if (items.length === 0) {
    table.style.display = 'none';
    emptyNote.style.display = 'block';
    emptyNote.textContent = 'لا توجد أصناف في القائمة بعد.';
    return;
  }

  table.style.display = 'table';
  emptyNote.style.display = 'none';

  // Header row
  const headRow = document.getElementById('matrix-head-row');
  headRow.innerHTML = '<th class="name-col">الاسم</th>' + items.map(item => `
    <th><span class="item-head-name">${escapeHtml(item.name)}</span><span class="item-head-sub">${escapeHtml(item.restaurant)}</span></th>
  `).join('');

  // Body rows (one per employee)
  const bodyEl = document.getElementById('matrix-body');
  if (employees.length === 0) {
    bodyEl.innerHTML = `<tr><td class="name-col">—</td>${items.map(() => '<td></td>').join('')}</tr>`;
  } else {
    bodyEl.innerHTML = employees.map(name => {
      const row = matrix[name] || {};
      const cells = items.map(item => {
        const q = row[item.id];
        return `<td class="qty-cell">${q ? q : ''}</td>`;
      }).join('');
      return `<tr><td class="name-col">${escapeHtml(name)}</td>${cells}</tr>`;
    }).join('');
  }

  // Footer summary rows: price, qty sold, total per item
  const footEl = document.getElementById('matrix-foot');
  const priceRow = '<tr class="summary-row"><td class="name-col">السعر</td>' +
    items.map(item => `<td>$${Number(item.price).toFixed(2)}</td>`).join('') + '</tr>';
  const qtyRow = '<tr class="summary-row"><td class="name-col">الكمية</td>' +
    items.map(item => `<td>${(totalsByItem[item.id] || {}).qty || 0}</td>`).join('') + '</tr>';
  const totalRow = '<tr class="summary-row"><td class="name-col">الإجمالي</td>' +
    items.map(item => `<td>$${(totalsByItem[item.id] || {}).total || '0.00'}</td>`).join('') + '</tr>';
  footEl.innerHTML = priceRow + qtyRow + totalRow;

  latestGrandTotal = Number(data.grandTotal) || 0;
  updateFooterTotals();
}

function updateFooterTotals() {
  const fee = Number(document.getElementById('delivery-fee').value) || 0;
  document.getElementById('subtotal').textContent = '$' + latestGrandTotal.toFixed(2);
  document.getElementById('full-total').textContent = '$' + (latestGrandTotal + fee).toFixed(2);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('submit-btn').addEventListener('click', submitOrder);
document.getElementById('refresh-btn').addEventListener('click', loadTotals);
document.getElementById('delivery-fee').addEventListener('input', updateFooterTotals);

initOrder();
setInterval(loadTotals, FOUR_HOURS);
</script>
</body>
</html>
