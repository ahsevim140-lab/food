<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب غداء المكتب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#2a382f; --green-panel:#33443a; --green-panel-2:#3b4d42;
    --gold:#c99457; --gold-soft:#dab27d; --cream:#e8e2d4; --cream-dim:#aeb8ac;
    --line:#46574b; --danger:#c97a63;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--green-deep); color:var(--cream); font-family:'Cairo', sans-serif; min-height:100vh;}
  .wrap{max-width:760px; margin:0 auto; padding:32px 20px 80px;}
  header{border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:24px;}
  .nav{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px;}
  h1{font-family:'Cairo', sans-serif; font-weight:600; font-size:clamp(22px,5vw,28px); margin:0;}
  .date{font-family:'Cairo', sans-serif; color:var(--gold-soft); font-size:13px;}
  .tabs{display:flex; gap:8px; margin-top:14px;}
  .tabs button{
    font-family:'Cairo', sans-serif; font-size:13px; cursor:pointer;
    padding:7px 16px; border-radius:20px; border:1px solid var(--line); background:transparent; color:var(--cream-dim);
  }
  .tabs button.active{background:var(--gold); color:var(--green-deep); border-color:var(--gold); font-weight:600;}

  .view{display:none;}
  .view.active{display:block;}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12px; color:var(--cream-dim); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; font-family:'Cairo', sans-serif; font-size:15px; padding:10px 12px;
    border-radius:8px; border:1px solid var(--line); background:var(--green-panel); color:var(--cream);
  }
  .field select{appearance:none; background-image:linear-gradient(45deg, transparent 50%, var(--gold-soft) 50%), linear-gradient(135deg, var(--gold-soft) 50%, transparent 50%); background-position:left 18px center, left 13px center; background-size:5px 5px, 5px 5px; background-repeat:no-repeat;}
  .field textarea{min-height:50px; resize:none;}
  .field.disabled select{opacity:0.5;}

  .item-panel{
    background:var(--green-panel); border:1px solid var(--line); border-radius:10px;
    padding:16px; display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px;
  }
  .item-panel .name{font-size:15px;}
  .item-panel .price{font-family:'IBM Plex Mono', monospace; color:var(--gold-soft); font-size:14px; direction:ltr;}
  .qty-input{
    width:70px; font-family:'IBM Plex Mono', monospace; font-size:15px; text-align:center;
    padding:8px 6px; border-radius:6px; border:1px solid var(--line); background:var(--green-deep); color:var(--cream);
  }
  .qty-input:focus-visible, select:focus-visible, button:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}

  .cart-summary{
    background:var(--green-panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; margin:20px 0; font-size:13.5px;
    display:flex; justify-content:space-between; color:var(--cream-dim);
  }
  .cart-summary strong{color:var(--gold-soft); font-size:15px; font-family:'IBM Plex Mono', monospace; direction:ltr; unicode-bidi:embed;}

  .submit-btn{
    width:100%; padding:14px; border:none; border-radius:8px; background:var(--gold); color:var(--green-deep);
    font-family:'Cairo', sans-serif; font-weight:600; font-size:15px; cursor:pointer;
    transition:transform 0.08s ease, background 0.15s ease;
  }
  .submit-btn:hover{background:var(--gold-soft);}
  .submit-btn:active{transform:scale(0.98);}
  .submit-btn:disabled{opacity:0.5; cursor:not-allowed;}

  .status{margin-top:12px; font-size:13.5px; text-align:center;}
  .status.ok{color:#9cc4a2;}
  .status.err{color:var(--danger);}
  .loading, .setup-warning, .empty-note{font-family:'Cairo', sans-serif; color:var(--cream-dim); font-size:14px; padding:16px 0;}
  .setup-warning{background:var(--green-panel); border:1px solid var(--gold); border-radius:8px; padding:16px; color:var(--gold-soft);}

  .meta-row{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px;}
  .meta-card{flex:1; min-width:140px; background:var(--green-panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px;}
  .meta-card .label{font-size:12px; color:var(--cream-dim);}
  .meta-card .value{font-family:'IBM Plex Mono', monospace; font-weight:500; font-size:22px; color:var(--gold-soft); margin-top:4px; direction:ltr;}

  table{width:100%; border-collapse:collapse; margin-bottom:8px;}
  thead th{text-align:right; font-family:'Cairo', sans-serif; font-size:12px; color:var(--cream-dim); padding:0 8px 8px; border-bottom:1px solid var(--line); font-weight:600;}
  th.num-head{text-align:left;}
  tbody td{padding:11px 8px; border-bottom:1px solid var(--line); font-size:14.5px;}
  tbody tr:last-child td{border-bottom:none;}
  td.num-cell{text-align:left;}
  .num{font-family:'IBM Plex Mono', monospace; color:var(--gold-soft); white-space:nowrap; direction:ltr; unicode-bidi:embed;}
  tfoot td{padding:14px 8px; font-family:'Cairo', sans-serif; font-weight:600; font-size:16px; border-top:2px solid var(--cream); color:var(--gold-soft);}
  tfoot td:first-child{color:var(--cream);}

  .refresh-row{display:flex; justify-content:space-between; align-items:center; margin:20px 0 6px; flex-wrap:wrap; gap:8px;}
  .refresh-btn{
    font-family:'Cairo', sans-serif; font-size:13px; font-weight:600; padding:9px 16px;
    border-radius:8px; border:1px solid var(--line); background:var(--green-panel); color:var(--gold-soft); cursor:pointer;
  }
  .refresh-btn:hover{background:var(--green-panel-2);}
  .updated{font-family:'Cairo', sans-serif; font-size:12px; color:var(--cream-dim);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="nav">
      <h1 id="page-title">طلب غداء المكتب</h1>
      <div class="date" id="today"></div>
    </div>
    <div class="tabs">
      <button id="tab-order" class="active" onclick="switchTab('order')">تقديم الطلب</button>
      <button id="tab-totals" onclick="switchTab('totals')">عرض الإجماليات</button>
    </div>
  </header>

  <!-- ORDER VIEW -->
  <div id="view-order" class="view active">
    <div class="field">
      <label for="category">الفئة الرئيسية</label>
      <select id="category"><option>جارٍ التحميل…</option></select>
    </div>

    <div class="field" id="subcategory-field">
      <label for="subcategory">الفئة الفرعية</label>
      <select id="subcategory"><option>اختر الفئة الرئيسية أولاً</option></select>
    </div>

    <div id="item-panel" class="item-panel" style="display:none;">
      <span class="name" id="item-name"></span>
      <span class="price num" id="item-price"></span>
      <input type="number" min="0" step="1" class="qty-input" id="item-qty" placeholder="0">
    </div>
    <div id="empty-note" class="empty-note" style="display:none;"></div>

    <div class="cart-summary">
      <span id="cart-count">0 عنصر مختار</span>
      <span>الإجمالي: <strong id="cart-total">$0.00</strong></span>
    </div>

    <div class="field">
      <label for="name">اسمك</label>
      <select id="name"><option value="">اختر اسمك</option></select>
    </div>
    <div class="field">
      <label for="notes">ملاحظات (اختياري)</label>
      <textarea id="notes" placeholder="بدون بصل، صلصة إضافية…"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn">إرسال الطلب</button>
    <div class="status" id="status"></div>
  </div>

  <!-- TOTALS VIEW -->
  <div id="view-totals" class="view">
    <div class="meta-row">
      <div class="meta-card"><div class="label">عدد الموظفين الذين طلبوا</div><div class="value" id="employee-count">–</div></div>
      <div class="meta-card"><div class="label">عدد الطلبات</div><div class="value" id="order-count">–</div></div>
      <div class="meta-card"><div class="label">الإجمالي الكلي</div><div class="value" id="grand-total">–</div></div>
    </div>

    <table id="totals-table" style="display:none;">
      <thead><tr><th>الصنف</th><th class="num-head">الكمية</th><th class="num-head">الإجمالي</th></tr></thead>
      <tbody id="totals-rows"></tbody>
      <tfoot><tr><td>الإجمالي الكلي</td><td></td><td class="num-cell num" id="footer-total"></td></tr></tfoot>
    </table>
    <div class="empty-note" id="totals-empty-note" style="display:none;">لم يتم تقديم أي طلبات بعد.</div>

    <div class="refresh-row">
      <button class="refresh-btn" id="refresh-btn">تحديث الآن</button>
      <span class="updated" id="updated"></span>
    </div>
  </div>
</div>

<script>
// ====== ضع رابط تطبيق الويب الكامل من Apps Script هنا بعد النشر ======
const APPS_SCRIPT_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';
// ========================================================================

const FOUR_HOURS = 4 * 60 * 60 * 1000;
let MENU = [];
const flatMenu = {}; // id -> {name, price, category}
const qty = {}; // id -> quantity, persists across category/subcategory switches
let totalsLoadedOnce = false;

document.getElementById('today').textContent = new Date().toLocaleDateString('ar-EG-u-nu-latn', {
  weekday: 'long', month: 'long', day: 'numeric'
});

// ---- Tab switching ----
function switchTab(tab) {
  document.getElementById('view-order').classList.toggle('active', tab === 'order');
  document.getElementById('view-totals').classList.toggle('active', tab === 'totals');
  document.getElementById('tab-order').classList.toggle('active', tab === 'order');
  document.getElementById('tab-totals').classList.toggle('active', tab === 'totals');
  document.getElementById('page-title').textContent = tab === 'order' ? 'طلب غداء المكتب' : 'إجماليات الطلبات';
  if (tab === 'totals' && !totalsLoadedOnce) loadTotals();
}

// ---- Order view ----
async function initOrder() {
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    document.getElementById('category').innerHTML = '<option>الإعداد مطلوب</option>';
    document.getElementById('empty-note').style.display = 'block';
    document.getElementById('empty-note').innerHTML = '<div class="setup-warning">أضف رابط تطبيق الويب من Apps Script إلى APPS_SCRIPT_URL في أعلى الكود بهذا الملف لتحميل القائمة.</div>';
    return;
  }
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const data = await res.json();
    MENU = data.menu || [];
    MENU.forEach(group => group.items.forEach(item => {
      flatMenu[item.id] = { name: item.name, price: item.price, category: group.category };
    }));
    populateCategories();
    populateEmployees(data.employees || []);
  } catch (err) {
    document.getElementById('category').innerHTML = '<option>تعذر تحميل القائمة</option>';
  }
}

function populateEmployees(names) {
  const select = document.getElementById('name');
  if (!names || names.length === 0) {
    select.innerHTML = '<option value="">لا توجد أسماء بعد — أضفها في تبويب Employees</option>';
    return;
  }
  select.innerHTML = '<option value="">اختر اسمك</option>' +
    names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
}

function populateCategories() {
  const select = document.getElementById('category');
  if (MENU.length === 0) {
    select.innerHTML = '<option>لا توجد أصناف بعد</option>';
    return;
  }
  select.innerHTML = MENU.map(group => `<option value="${escapeHtml(group.category)}">${escapeHtml(group.category)}</option>`).join('');
  select.addEventListener('change', populateSubcategories);
  populateSubcategories();
}

function populateSubcategories() {
  const category = document.getElementById('category').value;
  const group = MENU.find(g => g.category === category);
  const select = document.getElementById('subcategory');

  if (!group || group.items.length === 0) {
    select.innerHTML = '<option>لا توجد فئات فرعية</option>';
    hideItemPanel('لا توجد عناصر في هذه الفئة.');
    return;
  }

  select.innerHTML = group.items.map(item => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join('');
  select.onchange = renderItemPanel;
  renderItemPanel();
}

function renderItemPanel() {
  const id = document.getElementById('subcategory').value;
  const item = flatMenu[id];
  const panel = document.getElementById('item-panel');
  const emptyNote = document.getElementById('empty-note');

  if (!item) { hideItemPanel('اختر فئة فرعية.'); return; }

  panel.style.display = 'flex';
  emptyNote.style.display = 'none';
  document.getElementById('item-name').textContent = item.name;
  document.getElementById('item-price').textContent = '$' + Number(item.price).toFixed(2);

  const qtyInput = document.getElementById('item-qty');
  qtyInput.value = qty[id] || '';
  qtyInput.oninput = () => {
    const val = Math.max(0, parseInt(qtyInput.value, 10) || 0);
    qty[id] = val;
    renderCartSummary();
  };
}

function hideItemPanel(message) {
  document.getElementById('item-panel').style.display = 'none';
  const emptyNote = document.getElementById('empty-note');
  emptyNote.style.display = 'block';
  emptyNote.textContent = message;
}

function renderCartSummary() {
  let count = 0, total = 0;
  Object.keys(qty).forEach(id => {
    const q = qty[id] || 0;
    if (q > 0 && flatMenu[id]) { count += q; total += q * flatMenu[id].price; }
  });
  document.getElementById('cart-count').textContent = count + ' عنصر مختار';
  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
}

async function submitOrder() {
  const nameSelect = document.getElementById('name');
  const notesInput = document.getElementById('notes');
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('submit-btn');

  const name = nameSelect.value;
  const items = Object.keys(qty).filter(id => qty[id] > 0).map(id => ({ id, qty: qty[id] }));

  statusEl.textContent = '';
  statusEl.className = 'status';

  if (!name) { statusEl.textContent = 'الرجاء اختيار اسمك.'; statusEl.className = 'status err'; return; }
  if (items.length === 0) { statusEl.textContent = 'الرجاء إضافة عنصر واحد على الأقل.'; statusEl.className = 'status err'; return; }

  btn.disabled = true;
  btn.textContent = 'جارٍ الإرسال…';

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
      body: JSON.stringify({ name, items, notes: notesInput.value.trim() })
    });
    const result = await res.json();

    if (result.ok) {
      statusEl.textContent = 'تم إرسال الطلب — شكرًا ' + name + '! الإجمالي: $' + result.total;
      statusEl.className = 'status ok';
      Object.keys(qty).forEach(id => qty[id] = 0);
      renderItemPanel();
      renderCartSummary();
      nameSelect.value = '';
      notesInput.value = '';
      totalsLoadedOnce = false; // refetch totals next time that tab opens
    } else {
      throw new Error(result.error || 'Unknown error');
    }
  } catch (err) {
    statusEl.textContent = 'حدث خطأ ما — حاول مرة أخرى.';
    statusEl.className = 'status err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'إرسال الطلب';
  }
}

// ---- Totals view ----
async function loadTotals() {
  const table = document.getElementById('totals-table');
  const rowsEl = document.getElementById('totals-rows');
  const emptyNote = document.getElementById('totals-empty-note');
  const updatedEl = document.getElementById('updated');

  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    emptyNote.style.display = 'block';
    emptyNote.innerHTML = '<div class="setup-warning">أضف رابط تطبيق الويب من Apps Script إلى APPS_SCRIPT_URL في أعلى الكود بهذا الملف.</div>';
    return;
  }

  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=totals');
    const data = await res.json();
    totalsLoadedOnce = true;

    document.getElementById('employee-count').textContent = data.employeeCount || 0;
    document.getElementById('order-count').textContent = data.orderCount || 0;
    document.getElementById('grand-total').textContent = '$' + (data.grandTotal || '0.00');
    document.getElementById('footer-total').textContent = '$' + (data.grandTotal || '0.00');

    if (!data.items || data.items.length === 0) {
      table.style.display = 'none';
      emptyNote.style.display = 'block';
      emptyNote.textContent = 'لم يتم تقديم أي طلبات بعد.';
    } else {
      table.style.display = 'table';
      emptyNote.style.display = 'none';
      rowsEl.innerHTML = data.items
        .sort((a, b) => b.qty - a.qty)
        .map(item => `
          <tr>
            <td>${escapeHtml(item.name)}</td>
            <td class="num-cell num">${item.qty}</td>
            <td class="num-cell num">$${item.total}</td>
          </tr>
        `).join('');
    }

    updatedEl.textContent = 'آخر تحديث ' + new Date().toLocaleTimeString('ar-EG-u-nu-latn');
  } catch (err) {
    emptyNote.style.display = 'block';
    emptyNote.innerHTML = '<div class="setup-warning">تعذر تحميل الإجماليات. تحقق من رابط Apps Script.</div>';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('submit-btn').addEventListener('click', submitOrder);
document.getElementById('refresh-btn').addEventListener('click', loadTotals);

initOrder();
setInterval(loadTotals, FOUR_HOURS); // background refresh even if tab isn't open
</script>
</body>
</html>
